name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build app
        run: pnpm build

      - name: Build & Publish to GitHub Releases
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [ "${{ matrix.platform }}" = "mac" ] && [ -z "$CSC_LINK" ]; then
            echo "No macOS signing credentials found — building unsigned artifacts."
            EXTRA_ARGS="-c.mac.identity=null -c.mac.notarize=false -c.mac.hardenedRuntime=false"
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          pnpm dist:${{ matrix.platform }} --publish always $EXTRA_ARGS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.MAC_CERTIFICATE_P12_BASE64 || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_CERTIFICATE_PASSWORD || '' }}
          # macOS notarization
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
