name = "tunnelbox-license-signer"
main = "src/index.ts"
compatibility_date = "2026-06-09"

# Secrets — set with `wrangler secret put <NAME>`, never commit:
#   LS_WEBHOOK_SECRET   — LemonSqueezy store webhook signing secret
#   ED25519_PRIVATE_KEY — hex Ed25519 private key. Pull from OCI without it touching disk:
#       oci os object get --bucket-name tunnelbox-secrets \
#         --name license-signer/ed25519-private-v1.hex --file - | wrangler secret put ED25519_PRIVATE_KEY
#
# Email is sent via the Cloudflare Email Service `send_email` binding below (no API key);
# the LICENSE_FROM_EMAIL domain must be onboarded: `wrangler email sending enable <domain>`.
# The matching public key is embedded in the app as key_v1 (src/main/license/verifier.ts).

[vars]
# From address for the license email — domain must be onboarded to Email Sending.
LICENSE_FROM_EMAIL = "TunnelBox <license@tunnelboxapp.com>"

# Cloudflare Email Service binding (no API key). Onboard the from-domain once:
#   wrangler email sending enable tunnelboxapp.com
[[send_email]]
name = "EMAIL"

# Signed-license download store. Create the namespace first, then paste its id:
#   wrangler kv namespace create LICENSES
[[kv_namespaces]]
binding = "LICENSES"
id = "f5552e5c296847dcb518384743ff2ad6"

# [observability]
# enabled = true
